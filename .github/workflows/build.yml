name: Build Your Effects Final
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: {python-version: '3.11', cache: 'pip'}
    - run: pip install -r requirements.txt pyinstaller
    - run: pyinstaller --clean --noconfirm --onefile --windowed --name YourEffectsPortable --icon=assets/icon.ico --add-data "assets;assets" main.py
    - uses: actions/upload-artifact@v4
      with: {name: YourEffectsPortable-vFinal, path: dist/YourEffectsPortable.exe, retention-days: 30}
